name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only deploy if CI passed (or manual trigger)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: https://parametric-memory.dev
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 10m
          envs: IMAGE_TAG
          script: |
            set -euo pipefail

            cd /home/deploy/parametric-memory-web

            # Pull latest docker-compose.yml (no build needed on droplet)
            git fetch origin main
            git reset --hard origin/main

            # Pull the pre-built image from Docker Hub
            echo "Pulling image: $IMAGE_TAG"
            docker pull "$IMAGE_TAG"

            # Swap to the new image — no build, no CPU spike
            export GIT_COMMIT_SHA="${IMAGE_TAG##*:}"
            docker compose up -d --no-build --remove-orphans

            # Wait for health check
            echo "Waiting for health check..."
            HEALTH_OK=false
            for i in $(seq 1 20); do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                HEALTH_OK=true
                break
              fi
              echo "Attempt $i failed, waiting 3s..."
              sleep 3
            done

            if [ "$HEALTH_OK" != "true" ]; then
              echo "ERROR: Health check failed after 20 attempts"
              echo "Container logs:"
              docker compose logs --tail=50
              exit 1
            fi

            # Clean up old images to keep disk tidy
            docker image prune -f

            echo "Deployment successful: $IMAGE_TAG"
        env:
          IMAGE_TAG: ${{ secrets.DOCKERHUB_USERNAME }}/parametric-memory-web:${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(curl -sf https://parametric-memory.dev/api/health | jq -r '.status' 2>/dev/null || echo "unreachable")
          if [ "$STATUS" = "ok" ]; then
            echo "Production verified: status OK"
          else
            echo "WARNING: External health check returned: $STATUS"
            echo "This may be an nginx/SSL issue — the container itself is healthy."
          fi
