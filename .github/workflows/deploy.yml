name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only deploy if CI passes (ci.yml runs on same push)
    needs: []
    environment:
      name: production
      url: https://parametric-memory.dev
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /home/deploy/parametric-memory-web

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies
            npm ci --production=false

            # Generate docs from MMPM repo (if script exists)
            if [ -f "scripts/generate-docs.ts" ]; then
              npx tsx scripts/generate-docs.ts || echo "Doc generation skipped"
            fi

            # Build and deploy with zero downtime
            export GIT_COMMIT_SHA=${{ github.sha }}
            docker compose up -d --build --remove-orphans

            # Wait for health check
            echo "Waiting for health check..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                HEALTH_OK=true
                break
              fi
              echo "Attempt $i failed, waiting 3s..."
              sleep 3
            done

            if [ "${HEALTH_OK:-false}" != "true" ]; then
              echo "ERROR: Health check failed after 15 attempts"
              echo "Rolling back..."
              PREV_COMMIT=$(git log --format=%H -2 | tail -1)
              git reset --hard $PREV_COMMIT
              npm ci --production=false
              docker compose up -d --build
              exit 1
            fi

            echo "Deployment successful: $(git log --oneline -1)"

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -sf https://parametric-memory.dev/api/health | jq -r '.status' 2>/dev/null || echo "failed")
          if [ "$STATUS" = "ok" ]; then
            echo "Production verified: status OK"
          else
            echo "WARNING: Production health check returned: $STATUS"
            exit 1
          fi
