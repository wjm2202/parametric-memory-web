<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" font-family="'Outfit','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07182c"/><stop offset="1" stop-color="#0a2942"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d4368"/><stop offset="1" stop-color="#122c46"/>
    </linearGradient>
    <radialGradient id="amberglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fcd34d"/><stop offset="1" stop-color="#f59e0b"/>
    </radialGradient>
    <radialGradient id="nodeglow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#36aaf5"/><stop offset="1" stop-color="#0070c4"/>
    </radialGradient>
    <marker id="chev" markerWidth="12" markerHeight="12" refX="4" refY="5" orient="auto">
      <path d="M0,0 L6,5 L0,10" fill="none" stroke="#67e8f9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="chevA" markerWidth="12" markerHeight="12" refX="4" refY="5" orient="auto">
      <path d="M0,0 L6,5 L0,10" fill="none" stroke="#fcd34d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- logo composited at (80,70) 96x96 -->
  <text x="196" y="118" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Parametric Memory</text>
  <text x="198" y="156" font-size="22" font-weight="500" fill="#fcd34d" letter-spacing="0.5">memory with proof.</text>

  <!-- headline -->
  <text x="600" y="212" text-anchor="middle" font-size="36" font-weight="700" fill="#cbd5e1" letter-spacing="-0.5">The model is frozen at training.</text>
  <text x="600" y="256" text-anchor="middle" font-size="36" font-weight="700" fill="#67e8f9" letter-spacing="-0.5">Its memory doesn't have to be.</text>

  <!-- ===== PANEL 1: new events ===== -->
  <g>
    <rect x="80" y="292" width="286" height="410" rx="18" fill="#0e2238" stroke="#27405c" stroke-width="2"/>
    <text x="223" y="332" text-anchor="middle" font-size="19" font-weight="700" fill="#67e8f9" letter-spacing="0.5">NEW EVENTS &amp; FACTS</text>
    <text x="223" y="357" text-anchor="middle" font-size="15" fill="#7e93ab">after the model's cutoff</text>
    <g>
      <g transform="translate(105,388)">
        <rect width="236" height="56" rx="11" fill="#143049" stroke="#2f5070" stroke-width="1.5"/>
        <rect width="6" height="56" rx="3" fill="#fcd34d"/>
        <text x="22" y="25" font-size="15" font-weight="700" fill="#fcd34d">Jun 2026</text>
        <text x="22" y="46" font-size="15" fill="#e2e8f0">pricing changed</text>
      </g>
      <g transform="translate(105,460)">
        <rect width="236" height="56" rx="11" fill="#143049" stroke="#2f5070" stroke-width="1.5"/>
        <rect width="6" height="56" rx="3" fill="#22d3ee"/>
        <text x="22" y="25" font-size="15" font-weight="700" fill="#67e8f9">May 2026</text>
        <text x="22" y="46" font-size="15" fill="#e2e8f0">new regulation</text>
      </g>
      <g transform="translate(105,532)">
        <rect width="236" height="56" rx="11" fill="#143049" stroke="#2f5070" stroke-width="1.5"/>
        <rect width="6" height="56" rx="3" fill="#36aaf5"/>
        <text x="22" y="25" font-size="15" font-weight="700" fill="#7cc8fb">Apr 2026</text>
        <text x="22" y="46" font-size="15" fill="#e2e8f0">client renamed</text>
      </g>
    </g>
    <text x="223" y="630" text-anchor="middle" font-size="14" fill="#64809e">the world keeps moving</text>
  </g>

  <!-- arrow P1 -> P2 -->
  <line x1="372" y1="470" x2="448" y2="470" stroke="#67e8f9" stroke-width="3" marker-end="url(#chev)"/>
  <text x="410" y="452" text-anchor="middle" font-size="13" fill="#a5f3fc">captured</text>
  <text x="410" y="495" text-anchor="middle" font-size="13" fill="#a5f3fc">as atoms</text>

  <!-- ===== PANEL 2: parametric memory ===== -->
  <g>
    <rect x="456" y="292" width="286" height="410" rx="18" fill="#0d2c4a" stroke="#0c8ee6" stroke-width="2.5"/>
    <text x="599" y="332" text-anchor="middle" font-size="19" font-weight="700" fill="#36aaf5" letter-spacing="0.5">PARAMETRIC MEMORY</text>
    <text x="599" y="357" text-anchor="middle" font-size="15" fill="#bae0fd">the living layer</text>

    <!-- old / tombstoned atom -->
    <circle cx="505" cy="412" r="16" fill="#33475f" stroke="#5b6f86" stroke-width="2"/>
    <line x1="497" y1="404" x2="513" y2="420" stroke="#8a9bb0" stroke-width="2.5"/>
    <line x1="513" y1="404" x2="497" y2="420" stroke="#8a9bb0" stroke-width="2.5"/>
    <text x="533" y="408" font-size="16" fill="#7e93ab">price = $29</text>
    <line x1="533" y1="403" x2="635" y2="403" stroke="#7e93ab" stroke-width="2"/>
    <text x="533" y="430" font-size="13" fill="#64748b">tombstoned · stale</text>

    <!-- conflict marker -->
    <text x="599" y="470" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">conflict flagged</text>

    <!-- new / live atom -->
    <circle cx="505" cy="512" r="19" fill="url(#amberglow)" stroke="#fde68a" stroke-width="2.5"/>
    <circle cx="523" cy="496" r="9" fill="#072849" stroke="#22d3ee" stroke-width="2"/>
    <path d="M519,496 l3,3.5 l5,-7" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="538" y="508" font-size="16" font-weight="700" fill="#e2e8f0">price = $39</text>
    <text x="538" y="530" font-size="13" fill="#67e8f9">live · Merkle proof</text>

    <text x="599" y="595" text-anchor="middle" font-size="14" fill="#94a3b8">new fact contradicts old —</text>
    <text x="599" y="617" text-anchor="middle" font-size="14" fill="#94a3b8">flagged, not silently</text>
    <text x="599" y="639" text-anchor="middle" font-size="14" fill="#94a3b8">overwritten. you retire the stale one.</text>
  </g>

  <!-- arrow P2 -> P3 -->
  <line x1="748" y1="470" x2="824" y2="470" stroke="#67e8f9" stroke-width="3" marker-end="url(#chev)"/>
  <text x="786" y="452" text-anchor="middle" font-size="13" fill="#a5f3fc">loaded at</text>
  <text x="786" y="495" text-anchor="middle" font-size="13" fill="#a5f3fc">inference</text>

  <!-- ===== PANEL 3: frozen LLM, now current ===== -->
  <g>
    <rect x="832" y="292" width="286" height="410" rx="18" fill="#0e2238" stroke="#27405c" stroke-width="2"/>
    <text x="975" y="332" text-anchor="middle" font-size="19" font-weight="700" fill="#cbd5e1" letter-spacing="0.5">YOUR LLM</text>
    <text x="975" y="357" text-anchor="middle" font-size="15" fill="#94a3b8">weights still frozen</text>

    <!-- frost accents -->
    <g stroke="#7cc8fb" stroke-width="2" stroke-linecap="round" opacity="0.7">
      <g transform="translate(890,402)"><line x1="-6" y1="0" x2="6" y2="0"/><line x1="0" y1="-6" x2="0" y2="6"/><line x1="-4" y1="-4" x2="4" y2="4"/><line x1="-4" y1="4" x2="4" y2="-4"/></g>
      <g transform="translate(1060,402)"><line x1="-5" y1="0" x2="5" y2="0"/><line x1="0" y1="-5" x2="0" y2="5"/></g>
      <g transform="translate(905,545)"><line x1="-5" y1="0" x2="5" y2="0"/><line x1="0" y1="-5" x2="0" y2="5"/></g>
    </g>
    <!-- chip / model block (ice) -->
    <rect x="905" y="412" width="140" height="104" rx="14" fill="url(#ice)" stroke="#7cc8fb" stroke-width="2"/>
    <g stroke="#3d6b96" stroke-width="3">
      <line x1="905" y1="442" x2="885" y2="442"/><line x1="905" y1="486" x2="885" y2="486"/>
      <line x1="1045" y1="442" x2="1065" y2="442"/><line x1="1045" y1="486" x2="1065" y2="486"/>
      <line x1="945" y1="412" x2="945" y2="392"/><line x1="1005" y1="412" x2="1005" y2="392"/>
    </g>
    <text x="975" y="475" text-anchor="middle" font-size="30" font-weight="800" fill="#bae0fd" letter-spacing="1">LLM</text>

    <!-- now-current pill -->
    <g transform="translate(880,548)">
      <rect width="190" height="40" rx="20" fill="#08304f" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="95" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#67e8f9">answers now current</text>
    </g>
    <text x="975" y="632" text-anchor="middle" font-size="14" fill="#64809e">same model · fresh knowledge</text>
  </g>

  <!-- ===== feedback loop ===== -->
  <path d="M975,702 L975,748 L223,748 L223,706" fill="none" stroke="#fcd34d" stroke-width="3" marker-end="url(#chevA)"/>
  <text x="600" y="786" text-anchor="middle" font-size="18" fill="#cbd5e1">The loop closes — every session reasons on today's reality, not last year's training data.</text>

  <!-- ===== honesty strip ===== -->
  <g transform="translate(80,838)">
    <g>
      <rect width="336" height="92" rx="14" fill="#0e2238" stroke="#334b66" stroke-width="1.5"/>
      <text x="24" y="40" font-size="19" font-weight="700" fill="#36aaf5">Weights untouched</text>
      <text x="24" y="68" font-size="15" fill="#94a3b8">we don't retrain the model</text>
    </g>
    <g transform="translate(352,0)">
      <rect width="336" height="92" rx="14" fill="#0e2238" stroke="#334b66" stroke-width="1.5"/>
      <text x="24" y="40" font-size="19" font-weight="700" fill="#fbbf24">Conflicts flagged</text>
      <text x="24" y="68" font-size="15" fill="#94a3b8">not silently overwritten</text>
    </g>
    <g transform="translate(704,0)">
      <rect width="336" height="92" rx="14" fill="#0e2238" stroke="#334b66" stroke-width="1.5"/>
      <text x="24" y="40" font-size="19" font-weight="700" fill="#22d3ee">Every version proofed</text>
      <text x="24" y="68" font-size="15" fill="#94a3b8">Merkle-verifiable, which is live</text>
    </g>
  </g>

  <text x="1120" y="1010" text-anchor="end" font-size="18" fill="#64809e">parametric-memory.dev</text>
</svg>
