services:
  web:
    image: parametricmemory/parametric-memory-web:${GIT_COMMIT_SHA:-latest}
    container_name: pm-web
    restart: unless-stopped
    # Runtime hardening (read_only, cap_drop, no-new-privileges, resource
    # limits) deferred to a post-launch sprint when we have traffic to size
    # against. See docs/docker-hardening-changes-2026-05-12.md "Wave 2".
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - GIT_COMMIT_SHA=${GIT_COMMIT_SHA:-unknown}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - DOCS_WEBHOOK_SECRET=${DOCS_WEBHOOK_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-entityone22@gmail.com}
      # Sprint 16: MMPM connection for Substrate Viewer proxy
      - MMPM_API_URL=${MMPM_API_URL:-https://mmpm.co.nz}
      - MMPM_VIZ_API_KEY=${MMPM_VIZ_API_KEY}
      # Compute backend
      - MMPM_COMPUTE_URL=${MMPM_COMPUTE_URL:-https://memory.kiwi}
      # ── OAuth Phase 2 (ADR-003) — website-side OAuth dance ──────────
      # AUTH_OAUTH_ENABLED defaults to "false" so a host without these
      # vars set boots cleanly (OAuth endpoints 404; login falls back
      # to magic-link). To enable: set AUTH_OAUTH_ENABLED=true on the
      # host AND supply both halves of at least one provider pair.
      #
      # The four provider secrets have NO defaults on purpose — if the
      # host claims OAuth is enabled but a secret is missing, we want
      # the container to crash loudly at boot, not silently half-mint.
      - AUTH_OAUTH_ENABLED=${AUTH_OAUTH_ENABLED:-false}
      - COMPUTE_OAUTH_BRIDGE_SIGNING_KEY=${COMPUTE_OAUTH_BRIDGE_SIGNING_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
      # PUBLIC_SITE_URL is the redirect_uri base handed to providers;
      # must match what's registered with Google/GitHub exactly. The
      # default is the prod canonical host — dev overrides via env.
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-https://parametric-memory.dev}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
